<div class="highlight-wrapper">
  <div class="highlight-header">
    <span class="code-label">TERMINAL // {{ .Type | upper | default "BASH" }}</span>
    <button class="copy-btn" onclick="copyCode(this)">COPY</button>
  </div>
  {{ highlight .Inner .Type "lineNos=true,lineNumbersInTable=false" }}
</div>
